<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a6b45"/>
      <stop offset="100%" style="stop-color:#0d3d28"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f0c040"/>
      <stop offset="100%" style="stop-color:#c9973a"/>
    </linearGradient>
  </defs>
  <!-- خلفية -->
  <rect width="512" height="512" rx="100" fill="url(#bg)"/>
  <!-- شجرة النخيل -->
  <!-- الجذع -->
  <rect x="240" y="290" width="32" height="160" rx="8" fill="url(#gold)"/>
  <!-- الفروع اليمين -->
  <ellipse cx="350" cy="220" rx="80" ry="18" fill="#2d9e5f" transform="rotate(-30 350 220)"/>
  <ellipse cx="370" cy="180" rx="90" ry="16" fill="#34b86b" transform="rotate(-20 370 180)"/>
  <!-- الفروع اليسار -->
  <ellipse cx="162" cy="220" rx="80" ry="18" fill="#2d9e5f" transform="rotate(30 162 220)"/>
  <ellipse cx="142" cy="180" rx="90" ry="16" fill="#34b86b" transform="rotate(20 142 180)"/>
  <!-- الفروع الوسط -->
  <ellipse cx="256" cy="155" rx="85" ry="20" fill="#3dd68c" transform="rotate(-5 256 155)"/>
  <ellipse cx="256" cy="175" rx="75" ry="18" fill="#34b86b" transform="rotate(5 256 175)"/>
  <!-- تمر -->
  <circle cx="300" cy="250" r="10" fill="url(#gold)"/>
  <circle cx="280" cy="265" r="10" fill="url(#gold)"/>
  <circle cx="230" cy="255" r="10" fill="url(#gold)"/>
  <circle cx="215" cy="265" r="10" fill="url(#gold)"/>
  <!-- نص -->
  <text x="256" y="490" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="url(#gold)" text-anchor="middle">دليلك</text>
</svg>
