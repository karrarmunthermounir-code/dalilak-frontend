<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="description" content="دليلك — دليلك السياحي في العراق، اكتشف أجمل المطاعم والكافيهات والفنادق في جميع المحافظات" />
    <meta name="theme-color" content="#0d1f16" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="دليلك" />
    <title>دليلك 🌴 | دليلك السياحي في العراق</title>
    <!-- Preconnect لتسريع تحميل الموارد الخارجية -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://images.unsplash.com" />
    <link rel="dns-prefetch" href="https://images.unsplash.com" />
    <!-- تحميل الخطوط بشكل أسرع -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet" />
    <!-- شاشة تحميل أولية -->
    <style>
      body { background: #0d1f17; margin: 0; }
      #root:empty::before {
        content: '';
        display: block;
        width: 40px; height: 40px;
        border: 3px solid rgba(26,107,69,0.2);
        border-top-color: #1a6b45;
        border-radius: 50%;
        animation: sp 0.7s linear infinite;
        position: fixed; top: 50%; left: 50%;
        transform: translate(-50%, -50%);
      }
      @keyframes sp { to { transform: translate(-50%,-50%) rotate(360deg) } }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
